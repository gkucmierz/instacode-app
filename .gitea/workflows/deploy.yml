name: Build and Deploy Instacode
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker compose build instacode-app

      - name: Start Docker Context
        run: docker compose up -d instacode-app
