name: Build and Deploy Instacode
on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: self-hosted
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install nano-ui@latest --registry=https://gitea.7u.pl/api/packages/gkucmierz/npm/ --legacy-peer-deps

      - name: Run Unit Tests
        run: npm run test

      - name: Run E2E Tests
        run: npm run test:e2e

  build-and-deploy:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker compose build instacode-app

      - name: Start Docker Context
        run: docker compose up -d instacode-app
